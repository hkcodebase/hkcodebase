name: Deploy index.html to S3 + Invalidate CloudFront (OIDC)

on:
  push:
    branches: [ "develop" ]
    paths:
      - "hemantkumardev/index.html"
      - ".github/workflows/main.yml"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    env:
      AWS_REGION: us-east-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required variables are set
        shell: bash
        run: |
          set -euo pipefail
          : "${AWS_ROLE_ARN:?Missing vars.AWS_ROLE_ARN (GitHub repo variable)}"
          : "${S3_BUCKET_NAME:?Missing vars.S3_BUCKET_NAME (GitHub repo variable)}"
          : "${CLOUDFRONT_DISTRIBUTION_ID:?Missing vars.CLOUDFRONT_DISTRIBUTION_ID (GitHub repo variable)}"
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
          S3_BUCKET_NAME: ${{ vars.S3_BUCKET_NAME }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com
          role-session-name: github-actions-static-site

      - name: Upload index.html to S3
        run: |
          aws s3 cp "./hemantkumardev/index.html" "s3://${{ vars.S3_BUCKET_NAME }}/index.html" \
            --cache-control "max-age=60" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/index.html" "/"